<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniApp Admin</title>
  <style>
    :root {
      --bg: #0f1716;
      --card: #f3f5ef;
      --line: #ccd7cd;
      --text: #21312a;
      --muted: #5a6c63;
      --ok: #2f8e61;
      --warn: #b36d2e;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 18px;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }
    .meta {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0 0 14px;
    }
    .toolbar-btn {
      border: 1px solid #b8c9bb;
      border-radius: 999px;
      background: #f7faf5;
      color: #284138;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    .toolbar-btn.primary {
      background: #edf7f0;
      border-color: #9dc8ac;
    }
    .final-answers {
      margin: 0 0 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fafcf8;
      padding: 12px;
    }
    .final-answers[hidden] {
      display: none;
    }
    .final-answers-title {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 800;
    }
    .final-answers-list {
      display: grid;
      gap: 8px;
    }
    .final-answer-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
      padding: 10px;
    }
    .final-answer-item strong {
      display: block;
      margin-bottom: 4px;
    }
    .final-answer-meta {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px 6px;
      text-align: left;
      vertical-align: top;
    }
    th {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    .ok { color: var(--ok); font-weight: 700; }
    .warn { color: var(--warn); font-weight: 700; }
    .current {
      font-weight: 700;
      color: #2d4a40;
    }
    .route-list,
    .trigger-list {
      display: grid;
      gap: 6px;
    }
    .status-list {
      display: grid;
      gap: 6px;
    }
    .route-item,
    .trigger-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 6px 8px;
      background: #fbfcf8;
    }
    .status-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 6px 8px;
      background: #fbfcf8;
      font-weight: 700;
    }
    .status-item.done {
      background: #edf7f0;
      border-color: #b8d9c4;
      color: #2f6a48;
    }
    .status-item.pending {
      background: #fff4e8;
      border-color: #e3c39c;
      color: #8a5419;
    }
    .route-time,
    .trigger-time {
      display: block;
      margin-top: 3px;
      font-size: 11px;
      color: var(--muted);
    }
    .ack-btn {
      margin-top: 6px;
      border: 1px solid #b36d2e;
      border-radius: 999px;
      background: #fff4e8;
      color: #7e4d14;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 10px;
      cursor: pointer;
    }
    .empty {
      color: var(--muted);
      font-size: 12px;
    }
    .clue-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .clue-pill {
      border: 1px solid #c7d4c8;
      border-radius: 999px;
      background: #f7faf5;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 700;
      color: #35554b;
    }
    .item-list {
      display: grid;
      gap: 6px;
    }
    .item-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 6px 8px;
      background: #f7faf5;
    }
    .item-card strong {
      display: block;
      margin-bottom: 2px;
    }
    .trigger-item.done {
      border: 1px solid var(--line);
      background: #edf7f0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Admin Monitor</h1>
    <p id="meta" class="meta">Loading...</p>
    <div class="toolbar">
      <button type="button" class="toolbar-btn primary" id="toggleAnswersBtn">Показать итоговые ответы</button>
      <a class="toolbar-btn" href="/api/admin/export/teams.csv">Скачать команды CSV</a>
      <a class="toolbar-btn" href="/api/admin/export/events.csv">Скачать события CSV</a>
    </div>
    <section class="final-answers" id="finalAnswersSection" hidden>
      <p class="final-answers-title">Итоговые ответы команд</p>
      <div class="final-answers-list" id="finalAnswersList"></div>
    </section>
    <table>
      <thead>
        <tr>
          <th>Команда</th>
          <th>Перемещения</th>
          <th>Собрано</th>
          <th>Предметы</th>
          <th>Сейчас</th>
          <th>Улики</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

  <script>
    const rowsNode = document.getElementById('rows');
    const metaNode = document.getElementById('meta');
    const toggleAnswersBtn = document.getElementById('toggleAnswersBtn');
    const finalAnswersSection = document.getElementById('finalAnswersSection');
    const finalAnswersList = document.getElementById('finalAnswersList');
    let finalAnswersOpen = false;

    function escapeHtml(text) {
      return String(text || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function renderTriggers(teamName, triggers) {
      const pending = Array.isArray(triggers) ? triggers : [];

      if (pending.length === 0) {
        return '<span class="empty">Пока ничего не выдавать</span>';
      }

      return `<div class="trigger-list">
        ${pending.map((item) => `
        <div class="trigger-item">
          <div><strong>${escapeHtml(item.actionLabel || item.text)}</strong></div>
          <span class="trigger-time">${escapeHtml(item.at)}</span>
          <button
            type="button"
            class="ack-btn"
            data-team-name="${escapeHtml(teamName)}"
            data-trigger-id="${escapeHtml(item.id)}"
          >Улика выдана</button>
        </div>
      `).join('')}
      </div>`;
    }

    function renderClueStatuses(pendingTriggers, issuedTriggers) {
      const entries = [];
      const issued = Array.isArray(issuedTriggers) ? issuedTriggers : [];
      const pending = Array.isArray(pendingTriggers) ? pendingTriggers : [];

      issued.forEach((item) => {
        if (!item.clueNumber) {
          return;
        }

        entries.push({
          sort: Number(item.clueNumber),
          html: `
            <div class="status-item done">
              <div>Улика №${escapeHtml(item.clueNumber)} выдана</div>
              <span class="trigger-time">${escapeHtml(item.deliveredAt || item.at)}</span>
            </div>
          `
        });
      });

      pending.forEach((item) => {
        if (!item.clueNumber) {
          return;
        }

        entries.push({
          sort: Number(item.clueNumber),
          html: `
            <div class="status-item pending">
              <div>Улика №${escapeHtml(item.clueNumber)} не выдана</div>
              <span class="trigger-time">${escapeHtml(item.at)}</span>
            </div>
          `
        });
      });

      entries.sort((left, right) => left.sort - right.sort);

      if (entries.length === 0) {
        return '<span class="empty">Пока улик нет</span>';
      }

      return `<div class="status-list">${entries.map((item) => item.html).join('')}</div>`;
    }

    function renderCollectedClues(clues) {
      if (!Array.isArray(clues) || clues.length === 0) {
        return '<span class="empty">Пока ничего не собрано</span>';
      }

      return `<div class="clue-list">${clues.map((number) => `
        <span class="clue-pill">Улика №${escapeHtml(number)}</span>
      `).join('')}</div>`;
    }

    function renderCollectedItems(items) {
      if (!Array.isArray(items) || items.length === 0) {
        return '<span class="empty">Пока предметов нет</span>';
      }

      return `<div class="item-list">${items.map((item) => `
        <div class="item-card">
          <strong>${escapeHtml(item.label || item.id)}</strong>
          ${item.variant ? `<div>${escapeHtml(item.variant)}</div>` : ''}
          <span class="trigger-time">${escapeHtml(item.at || '')}</span>
        </div>
      `).join('')}</div>`;
    }

    function renderFinalAnswers(items) {
      if (!Array.isArray(items) || items.length === 0) {
        finalAnswersList.innerHTML = '<span class="empty">Пока никто не отправил итоговый ответ.</span>';
        return;
      }

      finalAnswersList.innerHTML = items.map((item) => `
        <div class="final-answer-item">
          <strong>${escapeHtml(item.teamName)}</strong>
          <div>${escapeHtml(item.answer)}</div>
          <div class="final-answer-meta">Отправлено: ${escapeHtml(item.answeredAt)} | Перемещения: ${escapeHtml(item.moveCountAtAnswer)}</div>
        </div>
      `).join('');
    }

    function render(rows, meta) {
      rowsNode.innerHTML = '';
      rows.forEach((team) => {
        const tr = document.createElement('tr');
        const currentLabel = team.currentPointLabel || 'Еще не начали';
        const currentClass = team.currentPointLabel ? 'current' : 'empty';

        tr.innerHTML = `
          <td><strong>${team.teamName}</strong></td>
          <td>
            <div><strong>${team.moveCount}</strong></div>
            <div class="empty">Города: ${team.uniquePointCount} | Решено: ${team.solvedCount}</div>
          </td>
          <td>${renderCollectedClues(team.collectedClueNumbers)}</td>
          <td>${renderCollectedItems(team.collectedItems)}</td>
          <td class="${currentClass}">${currentLabel}</td>
          <td>${renderClueStatuses(team.pendingTriggers, team.issuedTriggers)}</td>
          <td>${renderTriggers(team.teamName, team.pendingTriggers)}</td>
        `;

        rowsNode.appendChild(tr);
      });

      metaNode.textContent = `Обновлено: ${meta.updatedAt} | Событий: ${meta.eventsTotal}`;
      renderFinalAnswers(meta.finalAnswers || []);
      finalAnswersSection.hidden = !finalAnswersOpen;
      toggleAnswersBtn.textContent = finalAnswersOpen ? 'Скрыть итоговые ответы' : 'Показать итоговые ответы';
    }

    async function ackTrigger(teamName, triggerId) {
      const response = await fetch(`/api/admin/team/${encodeURIComponent(teamName)}/ack-trigger`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ triggerId })
      });

      const payload = await response.json();
      if (!response.ok || payload.ok === false) {
        throw new Error(payload.error || 'ack_failed');
      }
    }

    async function refresh() {
      try {
        const response = await fetch('/api/admin/summary');
        const payload = await response.json();
        if (!payload.ok) {
          throw new Error(payload.error || 'summary_failed');
        }
        render(payload.teams || [], payload);
      } catch (error) {
        metaNode.textContent = `Ошибка загрузки: ${error.message}`;
      }
    }

    rowsNode.addEventListener('click', async (event) => {
      const button = event.target.closest('.ack-btn');
      if (!button) {
        return;
      }

      const teamName = button.dataset.teamName;
      const triggerId = button.dataset.triggerId;
      if (!teamName || !triggerId) {
        return;
      }

      button.disabled = true;
      button.textContent = 'Отмечаем...';
      try {
        await ackTrigger(teamName, triggerId);
        await refresh();
      } catch (error) {
        button.disabled = false;
        button.textContent = 'Ошибка';
        metaNode.textContent = `Не удалось отметить улику: ${error.message}`;
      }
    });

    toggleAnswersBtn.addEventListener('click', () => {
      finalAnswersOpen = !finalAnswersOpen;
      finalAnswersSection.hidden = !finalAnswersOpen;
      toggleAnswersBtn.textContent = finalAnswersOpen ? 'Скрыть итоговые ответы' : 'Показать итоговые ответы';
    });

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
