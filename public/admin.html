<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniApp Admin</title>
  <style>
    :root {
      --bg: #0f1716;
      --card: #f3f5ef;
      --line: #ccd7cd;
      --text: #21312a;
      --muted: #5a6c63;
      --ok: #2f8e61;
      --warn: #b36d2e;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 18px;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }
    .meta {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px 6px;
      text-align: left;
      vertical-align: top;
    }
    th {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    .ok { color: var(--ok); font-weight: 700; }
    .warn { color: var(--warn); font-weight: 700; }
    .current {
      font-weight: 700;
      color: #2d4a40;
    }
    .route-list,
    .trigger-list {
      display: grid;
      gap: 6px;
    }
    .route-item,
    .trigger-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 6px 8px;
      background: #fbfcf8;
    }
    .route-time,
    .trigger-time {
      display: block;
      margin-top: 3px;
      font-size: 11px;
      color: var(--muted);
    }
    .ack-btn {
      margin-top: 6px;
      border: 1px solid #b36d2e;
      border-radius: 999px;
      background: #fff4e8;
      color: #7e4d14;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 10px;
      cursor: pointer;
    }
    .empty {
      color: var(--muted);
      font-size: 12px;
    }
    .clue-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .clue-pill {
      border: 1px solid #c7d4c8;
      border-radius: 999px;
      background: #f7faf5;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 700;
      color: #35554b;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Admin Monitor</h1>
    <p id="meta" class="meta">Loading...</p>
    <table>
      <thead>
        <tr>
          <th>Команда</th>
          <th>Перемещения</th>
          <th>Собрано</th>
          <th>Сейчас</th>
          <th>Маршрут</th>
          <th>Улики / действия</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

  <script>
    const rowsNode = document.getElementById('rows');
    const metaNode = document.getElementById('meta');

    function escapeHtml(text) {
      return String(text || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function renderRoute(route) {
      if (!Array.isArray(route) || route.length === 0) {
        return '<span class="empty">Пока нет перемещений</span>';
      }

      return `<div class="route-list">${route.map((item) => `
        <div class="route-item">
          <div>${escapeHtml(item.label)}</div>
          <span class="route-time">${escapeHtml(item.at)}</span>
        </div>
      `).join('')}</div>`;
    }

    function renderTriggers(teamName, triggers) {
      if (!Array.isArray(triggers) || triggers.length === 0) {
        return '<span class="empty">Пока ничего не выдавать</span>';
      }

      return `<div class="trigger-list">${triggers.map((item) => `
        <div class="trigger-item">
          <div><strong>${escapeHtml(item.actionLabel || item.text)}</strong></div>
          <span class="trigger-time">${escapeHtml(item.at)}</span>
          <button
            type="button"
            class="ack-btn"
            data-team-name="${escapeHtml(teamName)}"
            data-trigger-id="${escapeHtml(item.id)}"
          >Улика выдана</button>
        </div>
      `).join('')}</div>`;
    }

    function renderCollectedClues(clues) {
      if (!Array.isArray(clues) || clues.length === 0) {
        return '<span class="empty">Пока ничего не собрано</span>';
      }

      return `<div class="clue-list">${clues.map((number) => `
        <span class="clue-pill">Улика №${escapeHtml(number)}</span>
      `).join('')}</div>`;
    }

    function render(rows, meta) {
      rowsNode.innerHTML = '';
      rows.forEach((team) => {
        const tr = document.createElement('tr');
        const currentLabel = team.currentPointLabel || 'Еще не начали';
        const currentClass = team.currentPointLabel ? 'current' : 'empty';

        tr.innerHTML = `
          <td><strong>${team.teamName}</strong></td>
          <td>
            <div><strong>${team.moveCount}</strong></div>
            <div class="empty">Города: ${team.uniquePointCount} | Решено: ${team.solvedCount}</div>
          </td>
          <td>${renderCollectedClues(team.collectedClueNumbers)}</td>
          <td class="${currentClass}">${currentLabel}</td>
          <td>${renderRoute(team.recentRoute)}</td>
          <td>${renderTriggers(team.teamName, team.pendingTriggers)}</td>
        `;

        rowsNode.appendChild(tr);
      });

      metaNode.textContent = `Обновлено: ${meta.updatedAt} | Событий: ${meta.eventsTotal}`;
    }

    async function ackTrigger(teamName, triggerId) {
      const response = await fetch(`/api/admin/team/${encodeURIComponent(teamName)}/ack-trigger`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ triggerId })
      });

      const payload = await response.json();
      if (!response.ok || payload.ok === false) {
        throw new Error(payload.error || 'ack_failed');
      }
    }

    async function refresh() {
      try {
        const response = await fetch('/api/admin/summary');
        const payload = await response.json();
        if (!payload.ok) {
          throw new Error(payload.error || 'summary_failed');
        }
        render(payload.teams || [], payload);
      } catch (error) {
        metaNode.textContent = `Ошибка загрузки: ${error.message}`;
      }
    }

    rowsNode.addEventListener('click', async (event) => {
      const button = event.target.closest('.ack-btn');
      if (!button) {
        return;
      }

      const teamName = button.dataset.teamName;
      const triggerId = button.dataset.triggerId;
      if (!teamName || !triggerId) {
        return;
      }

      button.disabled = true;
      button.textContent = 'Отмечаем...';
      try {
        await ackTrigger(teamName, triggerId);
        await refresh();
      } catch (error) {
        button.disabled = false;
        button.textContent = 'Ошибка';
        metaNode.textContent = `Не удалось отметить улику: ${error.message}`;
      }
    });

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
